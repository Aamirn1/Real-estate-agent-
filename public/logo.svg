<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Partial circular ring (open at bottom) -->
  <path d="M 32 6 A 26 26 0 1 1 14 49" fill="none" stroke="url(#ringGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Left building (shorter, wider, dark blue) -->
  <rect x="21" y="26" width="9" height="20" rx="1.5" fill="#1e3a8a"/>
  <!-- Right building (taller, narrower, bright blue) -->
  <rect x="33" y="20" width="9" height="26" rx="1.5" fill="#3b82f6"/>
  <!-- Wave base -->
  <path d="M 14 50 Q 24 47 32 50 T 50 50" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
